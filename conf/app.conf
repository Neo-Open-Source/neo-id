appname = unified-id
httpport = 8081
runmode = dev

# JWT Configuration
jwt_secret = "your-super-secret-jwt-key-change-in-production"

# OAuth Configuration
google_client_id = "your-google-client-id"
google_client_secret = "your-google-client-secret"

github_client_id = "your-github-client-id"
github_client_secret = "your-github-client-secret"

yandex_client_id = "your-yandex-client-id"
yandex_client_secret = "your-yandex-client-secret"

vk_client_id = "your-vk-client-id"
vk_client_secret = "your-vk-client-secret"

# MongoDB Configuration
mongodb_uri = "mongodb+srv://test"

# Admin Configuration
admin_emails = "admin@unified-id.com"

# Base URL Configuration
base_url = "http://localhost:8080"
# For production: "https://your-domain.vercel.app"

# CORS Configuration
allowed_origins = "http://localhost:3000,https://neomovies.ru,https://api.neomovies.ru,https://anime.neomovies.ru"
